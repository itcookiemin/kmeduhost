services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: stepbaking-backend:latest
    container_name: stepbaking-backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_APPLICATION_NAME=StepBaking
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_API_URL=${CLAUDE_API_URL:-https://api.anthropic.com/v1/messages}
      - CLAUDE_API_MODEL=${CLAUDE_API_MODEL:-claude-sonnet-4-6}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_MODEL=${GEMINI_API_MODEL:-gemini-2.0-flash}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
